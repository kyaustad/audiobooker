name: Publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  # GHCR requires lowercase image names
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          labels: |
            org.opencontainers.image.title=Audiobooker
            org.opencontainers.image.description=Low-resource audiobook download manager for Audiobookshelf
            org.opencontainers.image.licenses=GPL-3.0
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Links the GHCR package to this repository and prefers public visibility
      # so `docker pull ghcr.io/<owner>/audiobooker` works for anyone.
      - name: Link package to repository and set public
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PACKAGE="$(echo "${REPO}" | tr '[:upper:]' '[:lower:]')"
          REPO_ID="${{ github.repository_id }}"

          link_package() {
            local api_base="$1"
            curl -sS -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_base}/packages/container/${PACKAGE}/repositories/${REPO_ID}" \
              -o /tmp/link.json -w "%{http_code}" || true
          }

          visibility_package() {
            local api_base="$1"
            curl -sS -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${api_base}/packages/container/${PACKAGE}/visibility" \
              -d '{"visibility":"public"}' \
              -o /tmp/vis.json -w "%{http_code}" || true
          }

          for base in \
            "https://api.github.com/user" \
            "https://api.github.com/orgs/${OWNER}"
          do
            code="$(link_package "${base}")"
            echo "link via ${base} -> HTTP ${code}"
            case "${code}" in 200|201|204) break ;; esac
          done

          for base in \
            "https://api.github.com/user" \
            "https://api.github.com/orgs/${OWNER}"
          do
            code="$(visibility_package "${base}")"
            echo "visibility via ${base} -> HTTP ${code}"
            case "${code}" in 200|201|204) break ;; esac
          done

          echo "Package: https://github.com/${OWNER}/${REPO}/pkgs/container/${PACKAGE}"
          echo "Pull:    docker pull ${REGISTRY}/${IMAGE_NAME_LC}:latest"
