services:
  audiobooker:
    image: ghcr.io/kyaustad/audiobooker:latest
    build: .
    container_name: audiobooker
    restart: unless-stopped
    # Unraid shares are often 99:100. Leave 0:0 (root) if you hit permission errors on /data.
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /data/audiobooker.db
      STATIC_DIR: /app/static
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      # SQLite + app state (must be writable)
      - ${APPDATA_PATH:-./data}:/data
      # Same tree qBittorrent completes into (read-only is fine)
      - ${TORRENT_DOWNLOADS_PATH:-/mnt/user/downloads}:/downloads:ro
      # Audiobookshelf library root (must be writable for imports)
      - ${AUDIOBOOK_LIBRARY_PATH:-/mnt/user/audiobooks}:/audiobooks
