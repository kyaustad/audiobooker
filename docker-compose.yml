services:
  audiobooker:
    build: .
    container_name: audiobooker
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      DATABASE_PATH: /data/audiobooker.db
      QBITTORRENT_URL: ${QBITTORRENT_URL:-http://qbittorrent:8080}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-adminadmin}
      QBITTORRENT_DOWNLOAD_PATH: /downloads
      AUDIOBOOK_DEST_PATH: /audiobooks
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      SYNC_INTERVAL_MS: ${SYNC_INTERVAL_MS:-10000}
    volumes:
      - ./data:/data
      # Point these at the same host paths your qBittorrent and Audiobookshelf containers use
      - ${TORRENT_DOWNLOADS_PATH:-/mnt/user/downloads}:/downloads:ro
      - ${AUDIOBOOK_LIBRARY_PATH:-/mnt/user/audiobooks}:/audiobooks
    networks:
      - audiobooker

  # Optional reference qBittorrent service — remove if you already run one on Unraid
  # qbittorrent:
  #   image: lscr.io/linuxserver/qbittorrent:latest
  #   container_name: qbittorrent
  #   profiles:
  #     - with-qbittorrent
  #   environment:
  #     - PUID=1000
  #     - PGID=1000
  #     - TZ=Etc/UTC
  #     - WEBUI_PORT=8080
  #   volumes:
  #     - ${TORRENT_DOWNLOADS_PATH:-/mnt/user/downloads}:/downloads
  #   ports:
  #     - "8080:8080"
  #   networks:
  #     - audiobooker

networks:
  audiobooker:
    driver: bridge
