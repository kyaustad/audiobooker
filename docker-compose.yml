services:
  audiobooker:
    image: ghcr.io/kyaustad/audiobooker:latest
    build: .
    container_name: audiobooker
    restart: unless-stopped
    # Unraid shares are often 99:100. Leave 0:0 (root) if you hit permission errors on /data.
    user: "${PUID:-0}:${PGID:-0}"
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_PATH: /data/audiobooker.db
      STATIC_DIR: /app/static
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      # Only required volume: app DB / state
      - ${APPDATA_PATH:-./data}:/data
      # Add your own mounts for qBit downloads and each library, e.g.:
      # - /mnt/user/downloads:/downloads:ro
      # - /opt/media/audiobooks:/audiobooks
      # - /opt/media/adultaudio:/adultaudio
      # Then set those container paths in Settings (download path + per-library paths).
